# Bitbucket Pipelines
# Generated by ExpressoTS CLI
# Strategy: basic
# Template Version: 1.0.0

image: node:{{nodeVersion}}-alpine

definitions:
  caches:
    npm: $HOME/.npm

pipelines:
  default:
    - step:
        name: Lint
        caches:
          - npm
          - node
        script:
          - {{installCmd}}
          - {{lintCmd}}

    - step:
        name: Test
        caches:
          - npm
          - node
        script:
          - {{installCmd}}
          - {{testCmd}}

    - step:
        name: Build
        caches:
          - npm
          - node
        script:
          - {{installCmd}}
          - {{buildCmd}}
        artifacts:
          - dist/**

  branches:
    {{branch}}:
      - step:
          name: Lint
          caches:
            - npm
            - node
          script:
            - {{installCmd}}
            - {{lintCmd}}

      - step:
          name: Test
          caches:
            - npm
            - node
          script:
            - {{installCmd}}
            - {{testCmd}}

      - step:
          name: Build
          caches:
            - npm
            - node
          script:
            - {{installCmd}}
            - {{buildCmd}}
          artifacts:
            - dist/**
