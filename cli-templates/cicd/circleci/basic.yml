# CircleCI Configuration
# Generated by ExpressoTS CLI
# Strategy: basic
# Template Version: 1.0.0

version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  lint:
    executor:
      name: node/default
      tag: '{{nodeVersion}}'
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Run linter
          command: {{lintCmd}}

  test:
    executor:
      name: node/default
      tag: '{{nodeVersion}}'
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Run tests
          command: {{testCmd}}

  build:
    executor:
      name: node/default
      tag: '{{nodeVersion}}'
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Build application
          command: {{buildCmd}}
      - persist_to_workspace:
          root: .
          paths:
            - dist

workflows:
  version: 2
  build-and-test:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - build:
          requires:
            - test
