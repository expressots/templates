# CircleCI Configuration
# Generated by ExpressoTS CLI
# Strategy: comprehensive
# Template Version: 1.0.0

version: 2.1

orbs:
  node: circleci/node@5.1.0
  docker: circleci/docker@2.4.0

jobs:
  lint:
    executor:
      name: node/default
      tag: '{{nodeVersion}}'
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Run linter
          command: {{lintCmd}}

  test:
    executor:
      name: node/default
      tag: '{{nodeVersion}}'
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Run tests
          command: {{testCmd}}
{{#includeCoverage}}
      - run:
          name: Run tests with coverage
          command: {{testCmd}} -- --coverage
      - store_artifacts:
          path: coverage
{{/includeCoverage}}

  security:
    docker:
      - image: aquasec/trivy:latest
    steps:
      - checkout
      - run:
          name: Run security scan
          command: trivy fs --severity HIGH,CRITICAL .

  build:
    executor:
      name: node/default
      tag: '{{nodeVersion}}'
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Build application
          command: {{buildCmd}}
      - persist_to_workspace:
          root: .
          paths:
            - dist

  docker-build:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker
      - docker/check
      - docker/build:
          image: {{dockerRegistry}}/$CIRCLE_PROJECT_REPONAME
          tag: $CIRCLE_SHA1
      - docker/push:
          image: {{dockerRegistry}}/$CIRCLE_PROJECT_REPONAME
          tag: $CIRCLE_SHA1

workflows:
  version: 2
  build-test-deploy:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - security:
          requires:
            - lint
      - build:
          requires:
            - test
            - security
      - docker-build:
          requires:
            - build
          filters:
            branches:
              only: {{branch}}
