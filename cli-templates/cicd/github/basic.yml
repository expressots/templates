# GitHub Actions CI/CD Pipeline
# Generated by ExpressoTS CLI
# Strategy: {{strategy}}
# Template Version: 1.0.0

name: CI/CD Pipeline

on:
  push:
    branches: [{{branch}}]
  pull_request:
    branches: [{{branch}}]

env:
  NODE_VERSION: '{{nodeVersion}}'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: '{{packageManager}}'
      
      - name: Install dependencies
        run: {{installCmd}}
      
      - name: Run linter
        run: {{lintCmd}}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: '{{packageManager}}'
      
      - name: Install dependencies
        run: {{installCmd}}
      
      - name: Run tests
        run: {{testCmd}}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: '{{packageManager}}'
      
      - name: Install dependencies
        run: {{installCmd}}
      
      - name: Build application
        run: {{buildCmd}}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
