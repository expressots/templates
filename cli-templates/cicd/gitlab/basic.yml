# GitLab CI/CD Pipeline
# Generated by ExpressoTS CLI
# Strategy: basic
# Template Version: 1.0.0

image: node:{{nodeVersion}}-alpine

stages:
  - lint
  - test
  - build

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/

lint:
  stage: lint
  script:
    - {{installCmd}}
    - {{lintCmd}}
  only:
    - {{branch}}
    - merge_requests

test:
  stage: test
  script:
    - {{installCmd}}
    - {{testCmd}}
  only:
    - {{branch}}
    - merge_requests

build:
  stage: build
  script:
    - {{installCmd}}
    - {{buildCmd}}
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - {{branch}}
