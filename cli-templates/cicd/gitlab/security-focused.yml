# GitLab CI/CD Pipeline
# Generated by ExpressoTS CLI
# Strategy: security-focused
# Template Version: 1.0.0

image: node:{{nodeVersion}}-alpine

stages:
  - lint
  - test
  - security
  - sast
  - build
  - container-scanning
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE
  SAST_EXCLUDED_PATHS: "node_modules, dist, coverage"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/

lint:
  stage: lint
  script:
    - {{installCmd}}
    - {{lintCmd}}
  only:
    - {{branch}}
    - merge_requests

test:
  stage: test
  script:
    - {{installCmd}}
    - {{testCmd}}
  only:
    - {{branch}}
    - merge_requests

npm-audit:
  stage: security
  script:
    - npm audit --audit-level=high
  allow_failure: true
  only:
    - {{branch}}
    - merge_requests

trivy-scan:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy fs --severity CRITICAL,HIGH --exit-code 1 --format sarif -o trivy-results.sarif .
  artifacts:
    reports:
      sast: trivy-results.sarif
  allow_failure: false
  only:
    - {{branch}}
    - merge_requests

build:
  stage: build
  script:
    - {{installCmd}}
    - {{buildCmd}}
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - {{branch}}

docker:
  stage: container-scanning
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
  only:
    - {{branch}}
