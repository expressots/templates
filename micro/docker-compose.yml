# ExpressoTS Micro Template - Docker Compose
# For local development and testing

version: "3.8"

services:
    # Main application
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=production
            - PORT=3000
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s
        restart: unless-stopped

    # Development mode with hot reload
    app-dev:
        build:
            context: .
            dockerfile: Dockerfile.development
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=development
            - PORT=3000
        volumes:
            - ./src:/app/src:ro
            - ./package.json:/app/package.json:ro
        command: npm run dev
        profiles:
            - dev

# Optional services for development (activate with profile)

    # Redis for caching/sessions
    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 3
        profiles:
            - with-redis

    # PostgreSQL database
    postgres:
        image: postgres:16-alpine
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=expressots
            - POSTGRES_PASSWORD=expressots
            - POSTGRES_DB=expressots
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U expressots"]
            interval: 10s
            timeout: 3s
            retries: 3
        profiles:
            - with-postgres

    # MongoDB database
    mongo:
        image: mongo:7
        ports:
            - "27017:27017"
        environment:
            - MONGO_INITDB_ROOT_USERNAME=expressots
            - MONGO_INITDB_ROOT_PASSWORD=expressots
        volumes:
            - mongo_data:/data/db
        profiles:
            - with-mongo

    # RabbitMQ for message queuing
    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            - RABBITMQ_DEFAULT_USER=expressots
            - RABBITMQ_DEFAULT_PASS=expressots
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 3s
            retries: 3
        profiles:
            - with-rabbitmq

    # Prometheus for metrics
    prometheus:
        image: prom/prometheus:latest
        ports:
            - "9090:9090"
        volumes:
            - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
        profiles:
            - with-monitoring

    # Grafana for dashboards
    grafana:
        image: grafana/grafana:latest
        ports:
            - "3001:3000"
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=admin
        volumes:
            - grafana_data:/var/lib/grafana
        profiles:
            - with-monitoring

    # Jaeger for distributed tracing
    jaeger:
        image: jaegertracing/all-in-one:latest
        ports:
            - "16686:16686"
            - "14268:14268"
        environment:
            - COLLECTOR_OTLP_ENABLED=true
        profiles:
            - with-tracing

volumes:
    redis_data:
    postgres_data:
    mongo_data:
    rabbitmq_data:
    grafana_data:

# Usage:
#
# Production mode:
#   docker-compose up app
#
# Development mode:
#   docker-compose --profile dev up app-dev
#
# With Redis:
#   docker-compose --profile with-redis up app redis
#
# With PostgreSQL:
#   docker-compose --profile with-postgres up app postgres
#
# With Monitoring (Prometheus + Grafana):
#   docker-compose --profile with-monitoring up app prometheus grafana
#
# With Tracing (Jaeger):
#   docker-compose --profile with-tracing up app jaeger
#
# Full stack:
#   docker-compose --profile with-redis --profile with-postgres --profile with-monitoring --profile with-tracing up
