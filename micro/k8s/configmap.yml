# ExpressoTS Micro Template - Kubernetes ConfigMap
# Non-sensitive configuration values

apiVersion: v1
kind: ConfigMap
metadata:
    name: expressots-micro-config
    labels:
        app: expressots-micro
data:
    # Application settings
    APP_NAME: "ExpressoTS Micro"
    APP_VERSION: "1.0.0"
    NODE_ENV: "production"
    PORT: "3000"

    # Logging
    LOG_LEVEL: "info"
    LOG_FORMAT: "json"

    # Performance
    NODE_OPTIONS: "--max-old-space-size=256"

    # Observability (optional - uncomment as needed)
    # JAEGER_ENDPOINT: "http://jaeger-collector:14268/api/traces"
    # PROMETHEUS_ENABLED: "true"
    # TRACING_ENABLED: "true"
    # TRACING_SAMPLE_RATE: "1.0"

    # Service Discovery (optional - uncomment as needed)
    # CONSUL_URL: "http://consul:8500"
    # SERVICE_DISCOVERY_ENABLED: "true"

---
# Secret for sensitive values
# In production, use external secret management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
    name: expressots-micro-secrets
    labels:
        app: expressots-micro
type: Opaque
stringData:
    # Database (if using)
    # DATABASE_URL: "postgresql://user:password@postgres:5432/db"

    # Redis (if using)
    # REDIS_URL: "redis://redis:6379"

    # JWT (if using auth)
    # JWT_SECRET: "your-super-secret-jwt-key"

    # API Keys (if using external services)
    # STRIPE_SECRET_KEY: "sk_live_..."
    # SENDGRID_API_KEY: "SG..."

    # Placeholder - replace with actual secrets
    PLACEHOLDER: "replace-with-real-secrets"
