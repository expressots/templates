# ExpressoTS Micro Template - Kubernetes Deployment
# Production-ready configuration with health checks, resources, and scaling

apiVersion: apps/v1
kind: Deployment
metadata:
    name: expressots-micro
    labels:
        app: expressots-micro
        version: v1
spec:
    replicas: 3
    selector:
        matchLabels:
            app: expressots-micro
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    template:
        metadata:
            labels:
                app: expressots-micro
                version: v1
            annotations:
                prometheus.io/scrape: "true"
                prometheus.io/port: "3000"
                prometheus.io/path: "/metrics"
        spec:
            serviceAccountName: expressots-micro
            securityContext:
                runAsNonRoot: true
                runAsUser: 1001
                runAsGroup: 1001
                fsGroup: 1001
            containers:
                - name: app
                  image: expressots-micro:latest
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 3000
                        protocol: TCP
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3000"
                  envFrom:
                      - configMapRef:
                            name: expressots-micro-config
                            optional: true
                      - secretRef:
                            name: expressots-micro-secrets
                            optional: true
                  resources:
                      requests:
                          memory: "128Mi"
                          cpu: "100m"
                      limits:
                          memory: "256Mi"
                          cpu: "500m"
                  livenessProbe:
                      httpGet:
                          path: /health/live
                          port: 3000
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health/ready
                          port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - weight: 100
                          podAffinityTerm:
                              labelSelector:
                                  matchExpressions:
                                      - key: app
                                        operator: In
                                        values:
                                            - expressots-micro
                              topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: topology.kubernetes.io/zone
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                      matchLabels:
                          app: expressots-micro

---
# Service
apiVersion: v1
kind: Service
metadata:
    name: expressots-micro
    labels:
        app: expressots-micro
spec:
    type: ClusterIP
    ports:
        - name: http
          port: 80
          targetPort: 3000
          protocol: TCP
    selector:
        app: expressots-micro

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
    name: expressots-micro
    labels:
        app: expressots-micro

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: expressots-micro
    labels:
        app: expressots-micro
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: expressots-micro
    minReplicas: 3
    maxReplicas: 10
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: 80
    behavior:
        scaleDown:
            stabilizationWindowSeconds: 300
            policies:
                - type: Percent
                  value: 10
                  periodSeconds: 60
        scaleUp:
            stabilizationWindowSeconds: 0
            policies:
                - type: Percent
                  value: 100
                  periodSeconds: 15
                - type: Pods
                  value: 4
                  periodSeconds: 15
            selectPolicy: Max

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
    name: expressots-micro
    labels:
        app: expressots-micro
spec:
    minAvailable: 2
    selector:
        matchLabels:
            app: expressots-micro
