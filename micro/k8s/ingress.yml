# ExpressoTS Micro Template - Kubernetes Ingress
# HTTPS configuration with TLS termination

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: expressots-micro
    labels:
        app: expressots-micro
    annotations:
        # Ingress class
        kubernetes.io/ingress.class: "nginx"

        # TLS/SSL with cert-manager
        cert-manager.io/cluster-issuer: "letsencrypt-prod"

        # Rate limiting
        nginx.ingress.kubernetes.io/rate-limit: "100"
        nginx.ingress.kubernetes.io/rate-limit-window: "1m"

        # Timeouts
        nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "30"

        # Body size limit
        nginx.ingress.kubernetes.io/proxy-body-size: "10m"

        # CORS (if needed)
        # nginx.ingress.kubernetes.io/enable-cors: "true"
        # nginx.ingress.kubernetes.io/cors-allow-origin: "*"

        # Security headers
        nginx.ingress.kubernetes.io/configuration-snippet: |
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
    ingressClassName: nginx
    tls:
        - hosts:
              - api.example.com
          secretName: expressots-micro-tls
    rules:
        - host: api.example.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: expressots-micro
                            port:
                                number: 80

---
# Network Policy - Restrict traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: expressots-micro
    labels:
        app: expressots-micro
spec:
    podSelector:
        matchLabels:
            app: expressots-micro
    policyTypes:
        - Ingress
        - Egress
    ingress:
        # Allow traffic from ingress controller
        - from:
              - namespaceSelector:
                    matchLabels:
                        name: ingress-nginx
          ports:
              - protocol: TCP
                port: 3000
        # Allow traffic from prometheus for scraping
        - from:
              - namespaceSelector:
                    matchLabels:
                        name: monitoring
          ports:
              - protocol: TCP
                port: 3000
    egress:
        # Allow DNS
        - to:
              - namespaceSelector: {}
          ports:
              - protocol: UDP
                port: 53
        # Allow outbound HTTPS
        - to:
              - ipBlock:
                    cidr: 0.0.0.0/0
          ports:
              - protocol: TCP
                port: 443
        # Allow outbound to other services in same namespace
        - to:
              - podSelector: {}
